<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Budgetable - Local-first personal finance tracking app with AI-powered insights." />
  <title>Budgetable - Personal Finance Made Simple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <script src="translations.js"></script>
  <script src="i18n.js"></script>
  <style>
    :root {
      --bg: #f6f4ec;
      --ink: #1e2a2c;
      --muted: #506265;
      --card: #fffdf8;
      --line: #d9d7cf;
      --brand: #0b7a68;
      --brand-deep: #125f7f;
      --accent: #f0e7c2;
      --focus: #1b4f9c;
      --shadow: 0 14px 32px rgba(19, 40, 46, 0.12);
      --radius-xl: 24px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      line-height: 1.62;
      background:
        radial-gradient(circle at 10% 8%, #fffef9 0%, transparent 36%),
        radial-gradient(circle at 82% 12%, #dff2eb 0%, transparent 29%),
        linear-gradient(180deg, #f8f6ee 0%, #f3f7f6 55%, #f7f3ea 100%);
      min-height: 100vh;
    }

    .background-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(28px);
      z-index: -1;
      pointer-events: none;
    }

    .orb-a {
      width: 220px;
      height: 220px;
      top: 10%;
      left: -80px;
      background: rgba(11, 122, 104, 0.14);
    }

    .orb-b {
      width: 260px;
      height: 260px;
      right: -90px;
      top: 48%;
      background: rgba(18, 95, 127, 0.17);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(246, 244, 236, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .nav-wrapper {
      width: min(1080px, 92vw);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: "Fraunces", serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--brand);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: #4d5e61;
      font-size: 0.9rem;
      transition: color 140ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--brand);
      font-weight: 600;
    }

    .page {
      width: min(1080px, 92vw);
      margin: 0 auto;
      padding: 40px 0;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 56px 28px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      background:
        linear-gradient(125deg, rgba(10, 122, 103, 0.98) 0%, rgba(24, 90, 118, 0.96) 62%, rgba(41, 66, 94, 0.97) 100%);
      color: #f7fffc;
      animation: riseIn 620ms ease-out both;
      text-align: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      right: -130px;
      top: -160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
    }

    .hero h1 {
      margin: 0;
      max-width: 28ch;
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 16px auto 0;
      max-width: 60ch;
      color: #d5f2ea;
      font-size: 1.05rem;
    }

    .cta-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 140ms ease, filter 140ms ease;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(90deg, #0b7a68 0%, #147c63 100%);
      color: #ffffff;
      border: 1px solid rgba(245, 255, 252, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.96) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      animation: riseIn 560ms ease-out both;
    }

    .card h3 {
      margin: 0;
      font-size: 1.2rem;
      color: #193435;
    }

    .card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0b7a68 0%, #147c63 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: "Fraunces", serif;
      font-size: 2rem;
      margin: 0 0 12px;
      color: #193435;
    }

    .section-subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 1.05rem;
    }

    footer {
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: #5d6f73;
      font-size: 0.88rem;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .hero {
        padding: 32px 16px;
      }

      .page {
        padding: 28px 0;
      }

      .nav-links {
        gap: 12px;
      }

      .cta-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="background-orb orb-a" aria-hidden="true"></div>
  <div class="background-orb orb-b" aria-hidden="true"></div>

  <nav>
    <div class="nav-wrapper">
      <a class="logo" href="landing.html">Budgetable</a>
      <ul class="nav-links">
        <li><a href="landing.html" class="active" data-i18n="home"></a></li>
        <li><a href="index.html" data-i18n="privacyTerms"></a></li>
        <li><a href="support.html" data-i18n="support"></a></li>
        <li><a href="how-to-use.html" data-i18n="guide"></a></li>
      </ul>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <h1 data-i18n="landingTitle"></h1>
      <p data-i18n="landingDesc"></p>
      <div class="cta-buttons">
        <a href="how-to-use.html" class="btn btn-primary" data-i18n="getStarted"></a>
        <a href="index.html" class="btn btn-secondary" data-i18n="privacyPolicy"></a>
      </div>
    </section>

    <section style="margin-top: 60px;">
      <h2 class="section-title" data-i18n="keyFeatures"></h2>
      <p class="section-subtitle" data-i18n="builtFor"></p>
      <div class="grid">
        <div class="card">
          <div class="icon-circle">📊</div>
          <h3 data-i18n="trackEverything"></h3>
          <p data-i18n="trackDesc"></p>
        </div>
        <div class="card">
          <div class="icon-circle">🔒</div>
          <h3 data-i18n="localFirst"></h3>
          <p data-i18n="localDesc"></p>
        </div>
        <div class="card">
          <div class="icon-circle">🤖</div>
          <h3 data-i18n="aiInsights"></h3>
          <p data-i18n="aiDesc"></p>
        </div>
        <div class="card">
          <div class="icon-circle">💱</div>
          <h3 data-i18n="multiCurrency"></h3>
          <p data-i18n="currencyDesc"></p>
        </div>
        <div class="card">
          <div class="icon-circle">📱</div>
          <h3 data-i18n="beautifulDesign"></h3>
          <p data-i18n="designDesc"></p>
        </div>
        <div class="card">
          <div class="icon-circle">⚙️</div>
          <h3 data-i18n="customizable"></h3>
          <p data-i18n="customDesc"></p>
        </div>
      </div>
    </section>

    <footer>
      <p data-i18n="copyright"></p>
    </footer>
  </main>
</body>
</html>
