<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Budgetable Guide - How to use the app and get started with personal finance tracking." />
  <title>Budgetable - How to Use</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <script src="translations.js"></script>
  <script src="i18n.js"></script>
  <style>
    :root {
      --bg: #f6f4ec;
      --ink: #1e2a2c;
      --muted: #506265;
      --card: #fffdf8;
      --line: #d9d7cf;
      --brand: #0b7a68;
      --brand-deep: #125f7f;
      --accent: #f0e7c2;
      --focus: #1b4f9c;
      --shadow: 0 14px 32px rgba(19, 40, 46, 0.12);
      --radius-xl: 24px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      line-height: 1.62;
      background:
        radial-gradient(circle at 10% 8%, #fffef9 0%, transparent 36%),
        radial-gradient(circle at 82% 12%, #dff2eb 0%, transparent 29%),
        linear-gradient(180deg, #f8f6ee 0%, #f3f7f6 55%, #f7f3ea 100%);
      min-height: 100vh;
    }

    .background-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(28px);
      z-index: -1;
      pointer-events: none;
    }

    .orb-a {
      width: 220px;
      height: 220px;
      top: 10%;
      left: -80px;
      background: rgba(11, 122, 104, 0.14);
    }

    .orb-b {
      width: 260px;
      height: 260px;
      right: -90px;
      top: 48%;
      background: rgba(18, 95, 127, 0.17);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(246, 244, 236, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .nav-wrapper {
      width: min(1080px, 92vw);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: "Fraunces", serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--brand);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: #4d5e61;
      font-size: 0.9rem;
      transition: color 140ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--brand);
      font-weight: 600;
    }

    .page {
      width: min(1080px, 92vw);
      margin: 0 auto;
      padding: 40px 0;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 56px 28px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      background:
        linear-gradient(125deg, rgba(10, 122, 103, 0.98) 0%, rgba(24, 90, 118, 0.96) 62%, rgba(41, 66, 94, 0.97) 100%);
      color: #f7fffc;
      animation: riseIn 620ms ease-out both;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 16px auto 0;
      max-width: 60ch;
      color: #d5f2ea;
      font-size: 1.05rem;
    }

    .section-title {
      font-family: "Fraunces", serif;
      font-size: 2rem;
      margin: 40px 0 12px;
      color: #193435;
    }

    .section-subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 1.05rem;
    }

    .guide-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.96) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
      animation: riseIn 560ms ease-out both;
    }

    .guide-card h3 {
      margin: 0;
      font-size: 1.2rem;
      color: #193435;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .guide-card p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .guide-card ol,
    .guide-card ul {
      margin: 12px 0 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .guide-card li {
      margin-bottom: 8px;
    }

    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0b7a68 0%, #147c63 100%);
      color: #ffffff;
      font-weight: 700;
      font-size: 0.9rem;
      margin-right: 8px;
    }

    .tip-box {
      background: linear-gradient(90deg, #eaf7f4 0%, #f5faf8 100%);
      border-left: 4px solid var(--brand);
      padding: 16px;
      border-radius: var(--radius-lg);
      margin: 16px 0;
      color: #24494f;
    }

    footer {
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: #5d6f73;
      font-size: 0.88rem;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .nav-links {
        gap: 12px;
      }

      .hero {
        padding: 32px 16px;
      }

      .page {
        padding: 28px 0;
      }

      .section-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="background-orb orb-a" aria-hidden="true"></div>
  <div class="background-orb orb-b" aria-hidden="true"></div>

  <nav>
    <div class="nav-wrapper">
      <a class="logo" href="landing.html">Budgetable</a>
      <ul class="nav-links">
        <li><a href="landing.html" data-i18n="home"></a></li>
        <li><a href="index.html" data-i18n="privacyTerms"></a></li>
        <li><a href="support.html" data-i18n="support"></a></li>
        <li><a href="how-to-use.html" class="active" data-i18n="guide"></a></li>
      </ul>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <h1 data-i18n="guideTitle"></h1>
      <p data-i18n="guideDesc"></p>
    </section>

    <h2 class="section-title" data-i18n="getStarted"></h2>
    <p class="section-subtitle" data-i18n="setupSubtitle"></p>

    <div class="guide-card">
      <h3 data-i18n="step1Title"></h3>
      <p data-i18n="step1Desc"></p>
      <div class="tip-box" data-i18n="step1Tip"></div>
    </div>

    <div class="guide-card">
      <h3 data-i18n="step2Title"></h3>
      <p data-i18n="step2Intro"></p>
      <ol id="step2-list"></ol>
    </div>

    <div class="guide-card">
      <h3 data-i18n="step3Title"></h3>
      <p data-i18n="step3Intro"></p>
      <ol id="step3-list"></ol>
    </div>

    <div class="guide-card">
      <h3 data-i18n="step4Title"></h3>
      <p data-i18n="step4Intro"></p>
      <ol id="step4-list"></ol>
    </div>

    <h2 class="section-title" data-i18n="advancedFeatures"></h2>
    <p class="section-subtitle" data-i18n="advancedSubtitle"></p>

    <div class="guide-card">
      <h3 data-i18n="recurringTitle"></h3>
      <p data-i18n="recurringIntro"></p>
      <p data-i18n="recurringDesc"></p>
    </div>

    <div class="guide-card">
      <h3 data-i18n="aiTitle"></h3>
      <p data-i18n="aiIntro"></p>
      <ol id="aiSteps-list"></ol>
      <div class="tip-box" data-i18n="aiPrivacy"></div>
    </div>

    <div class="guide-card">
      <h3 data-i18n="currencyTitle"></h3>
      <p data-i18n="currencyIntro"></p>
      <p data-i18n="currencyDesc"></p>
    </div>

    <div class="guide-card">
      <h3 data-i18n="savingsTitle"></h3>
      <p data-i18n="savingsDesc"></p>
      <ol id="savingsSteps-list"></ol>
    </div>

    <h2 class="section-title" data-i18n="bestPractices"></h2>
    <p class="section-subtitle" data-i18n="bestPracticesSubtitle"></p>

    <div class="guide-card">
      <h3 data-i18n="tip1Title"></h3>
      <p data-i18n="tip1Desc"></p>
    </div>

    <div class="guide-card">
      <h3 data-i18n="tip2Title"></h3>
      <p data-i18n="tip2Desc"></p>
    </div>

    <div class="guide-card">
      <h3 data-i18n="tip3Title"></h3>
      <p data-i18n="tip3Desc"></p>
    </div>

    <div class="guide-card">
      <h3 data-i18n="tip4Title"></h3>
      <p data-i18n="tip4Desc"></p>
    </div>

    <div class="guide-card">
      <h3 data-i18n="tip5Title"></h3>
      <p data-i18n="tip5Desc"></p>
    </div>

    <h2 class="section-title" data-i18n="needHelp"></h2>
    <p class="section-subtitle" data-i18n="needHelpSubtitle"></p>

    <div class="guide-card">
      <p><span data-i18n="needHelpText"></span> <a href="support.html" style="color: var(--brand); text-decoration: none;" data-i18n="supportCenter"></a></p>
    </div>

    <footer>
      <p data-i18n="copyright"></p>
    </footer>

    <script>
      // Populate list items after i18n is initialized
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const lists = {
            'step2-list': 'step2Items',
            'step3-list': 'step3Items',
            'step4-list': 'step4Items',
            'aiSteps-list': 'aiItems',
            'savingsSteps-list': 'savingsItems'
          };

          for (const [id, key] of Object.entries(lists)) {
            const list = document.getElementById(id);
            const items = window.i18n.getArray(key);
            list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
          }
        }, 100);
      });
    </script>
  </main>
</body>
</html>
