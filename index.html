<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Budgetable Privacy Policy and Terms of Service." />
  <title>Budgetable - Privacy & Terms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <script src="translations.js"></script>
  <script src="i18n.js"></script>
  <style>
    :root {
      --bg: #f6f4ec;
      --ink: #1e2a2c;
      --muted: #506265;
      --card: #fffdf8;
      --line: #d9d7cf;
      --brand: #0b7a68;
      --brand-deep: #125f7f;
      --highlight: #f0e7c2;
      --focus: #1b4f9c;
      --shadow: 0 14px 32px rgba(19, 40, 46, 0.12);
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      line-height: 1.62;
      background:
        radial-gradient(circle at 10% 8%, #fffef9 0%, transparent 36%),
        radial-gradient(circle at 82% 12%, #dff2eb 0%, transparent 29%),
        linear-gradient(180deg, #f8f6ee 0%, #f3f7f6 55%, #f7f3ea 100%);
      min-height: 100vh;
    }

    .background-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(28px);
      z-index: -1;
      pointer-events: none;
    }

    .orb-a {
      width: 220px;
      height: 220px;
      top: 10%;
      left: -80px;
      background: rgba(11, 122, 104, 0.14);
    }

    .orb-b {
      width: 260px;
      height: 260px;
      right: -90px;
      top: 48%;
      background: rgba(18, 95, 127, 0.17);
    }

    .page {
      width: min(1080px, 92vw);
      margin: 30px auto 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      background:
        linear-gradient(125deg, rgba(10, 122, 103, 0.98) 0%, rgba(24, 90, 118, 0.96) 62%, rgba(41, 66, 94, 0.97) 100%);
      color: #f7fffc;
      animation: riseIn 620ms ease-out both;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      right: -130px;
      top: -160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.79rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.16);
      color: #e9fffa;
      margin-bottom: 12px;
    }

    .hero h1 {
      margin: 0;
      max-width: 22ch;
      font-family: "Fraunces", serif;
      font-size: clamp(1.8rem, 5vw, 2.75rem);
      line-height: 1.12;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 14px 0 0;
      max-width: 62ch;
      color: #d5f2ea;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .pill {
      border: 1px solid rgba(240, 255, 251, 0.38);
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 0.86rem;
      color: #f5fffd;
      background: rgba(255, 255, 255, 0.08);
    }

    .jump-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 22px;
      animation: riseIn 720ms ease-out both;
    }

    .jump-links a {
      text-decoration: none;
      border-radius: 999px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      color: #1f3538;
      font-size: 0.88rem;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .jump-links a:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      background: #ffffff;
    }

    .jump-links a:focus-visible,
    .support-link:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.96) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px;
      animation: riseIn 560ms ease-out both;
    }

    .panel h2 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: 1.45rem;
      color: #193435;
    }

    .panel-intro {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .section {
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--radius-md);
      background: var(--card);
      border: 1px solid #ece8de;
    }

    .section h3 {
      margin: 0;
      font-size: 1rem;
      color: #244345;
    }

    .section p,
    .section li {
      color: #4d5e61;
      margin-top: 8px;
      font-size: 0.96rem;
    }

    .section ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .notice {
      margin-top: 14px;
      border-left: 4px solid var(--brand);
      background: linear-gradient(90deg, #eaf7f4 0%, #f5faf8 100%);
      padding: 12px;
      border-radius: 10px;
      color: #24494f;
      font-size: 0.95rem;
    }

    .support {
      margin-top: 18px;
      border-radius: var(--radius-lg);
      background: linear-gradient(120deg, #122d34 0%, #1c5359 100%);
      color: #eaf6f6;
      padding: 20px;
      box-shadow: var(--shadow);
      animation: riseIn 780ms ease-out both;
    }

    .support h2 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: 1.35rem;
      color: #f4fff9;
    }

    .support p {
      margin: 8px 0 0;
      color: #cce8e4;
    }

    .support-link {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      color: #ffffff;
      background: linear-gradient(90deg, #0b7a68 0%, #147c63 100%);
      border: 1px solid rgba(245, 255, 252, 0.3);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .support-link:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    footer {
      margin-top: 14px;
      text-align: center;
      color: #5d6f73;
      font-size: 0.88rem;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        margin-top: 18px;
      }

      .hero,
      .panel,
      .support {
        padding: 16px;
      }

      .hero h1 {
        max-width: 100%;
      }
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(246, 244, 236, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .nav-wrapper {
      width: min(1080px, 92vw);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: "Fraunces", serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--brand);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: #4d5e61;
      font-size: 0.9rem;
      transition: color 140ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--brand);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .nav-links {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="background-orb orb-a" aria-hidden="true"></div>
  <div class="background-orb orb-b" aria-hidden="true"></div>

  <nav>
    <div class="nav-wrapper">
      <a class="logo" href="landing.html">Budgetable</a>
      <ul class="nav-links">
        <li><a href="landing.html" data-i18n="home"></a></li>
        <li><a href="index.html" class="active" data-i18n="privacyTerms"></a></li>
        <li><a href="support.html" data-i18n="support"></a></li>
        <li><a href="how-to-use.html" data-i18n="guide"></a></li>
      </ul>
    </div>
  </nav>

  <main class="page">
    <header class="hero">
      <span class="eyebrow" data-i18n="policiesTitle" style="display:inline-flex;"></span>
      <h1 data-i18n="policiesTitle"></h1>
      <p data-i18n="policiesDesc"></p>
      <div class="hero-meta">
        <span class="pill" data-i18n="lastUpdated"></span>
        <span class="pill" data-i18n="appliesto"></span>
      </div>
    </header>

    <nav class="jump-links" aria-label="Policy sections">
      <a href="#privacy-policy" data-i18n="privacyPolicyTitle"></a>
      <a href="#terms-of-service" data-i18n="termsOfService"></a>
      <a href="#support" data-i18n="supportContact"></a>
    </nav>

    <section class="grid">
      <article class="panel" id="privacy-policy">
        <h2 data-i18n="privacyPolicyTitle"></h2>
        <p class="panel-intro" data-i18n="privacyIntro"></p>

        <section class="section">
          <h3 data-i18n="dataCollection"></h3>
          <ul id="dataCollection-list"></ul>
        </section>

        <section class="section">
          <h3 data-i18n="dataStorage"></h3>
          <ul id="dataStorage-list"></ul>
        </section>

        <section class="section">
          <h3 data-i18n="dataSharing"></h3>
          <p data-i18n="dataSharingText"></p>
        </section>

        <section class="section">
          <h3 data-i18n="aiFeatures"></h3>
          <p data-i18n="aiFeaturesText"></p>
        </section>

        <section class="section">
          <h3 data-i18n="userRights"></h3>
          <ul id="userRights-list"></ul>
        </section>

        <div class="notice" data-i18n="localCommitment"></div>
      </article>

      <article class="panel" id="terms-of-service">
        <h2 data-i18n="termsOfService"></h2>
        <p class="panel-intro" data-i18n="termsIntro"></p>

        <section class="section">
          <h3 data-i18n="acceptance"></h3>
          <p data-i18n="acceptanceText"></p>
        </section>

        <section class="section">
          <h3 data-i18n="license"></h3>
          <ul id="license-list"></ul>
        </section>

        <section class="section">
          <h3 data-i18n="disclaimer"></h3>
          <p data-i18n="disclaimerText"></p>
        </section>

        <section class="section">
          <h3 data-i18n="limitations"></h3>
          <p data-i18n="limitationsText"></p>
        </section>

        <section class="section">
          <h3 data-i18n="modifications"></h3>
          <p data-i18n="modificationsText"></p>
        </section>

        <div class="notice" data-i18n="reviewPeriodically"></div>
      </article>
    </section>

    <section class="support" id="support">
      <h2 data-i18n="supportContact"></h2>
      <p data-i18n="supportContactDesc"></p>
      <a class="support-link" href="mailto:openmobilekit@gmail.com">openmobilekit@gmail.com</a>
    </section>

    <footer>
      <p data-i18n="copyright"></p>
    </footer>
  </main>

  <script>
    // Populate list items after i18n is initialized
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const lists = {
          'dataCollection-list': 'dataCollectionItems',
          'dataStorage-list': 'dataStorageItems',
          'userRights-list': 'userRightsItems',
          'license-list': 'licenseItems'
        };

        for (const [id, key] of Object.entries(lists)) {
          const list = document.getElementById(id);
          const items = window.i18n.getArray(key);
          list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
        }
      }, 100);
    });
  </script>
</body>
</html>
